<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAXBALL DA TROPA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">
                HAXBALL DA TROPA 👑
            </h1>
            <h4 class="subtitle">
                O MELHOR Haxball de Parnaíba.
            </h4>
        </div>
        
        <div class="stats">
            <table class="form">
                <thead class="info">
                    <tr>
                        <th>GUILDA</th>
                        <th>NOME</th>
                        <th>JOGOS</th>
                        <th>GOLS</th>
                        <th>ASSISTÊNCIAS</th>
                    </tr>
                </thead>
                <tbody class="inputs">
                    <tr>
                        <td><input type="text" id="insertGuild"></td>
                        <td><input type="text" id="insertName"></td>
                        <td><input type="number" id="insertMatches"></td>
                        <td><input type="number" id="insertGoal"></td>
                        <td><input type="number" id="insertAssist"></td>
                    </tr>
                </tbody>
            </table>
            
            <button id="addList">
                + ADD
            </button>

        </div>

        <div class="table">
            <table class="list">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Guilda</th>
                        <th>Nome</th>
                        <th>Jogos</th>
                        <th>Gols</th>
                        <th>Assistências</th>
                        <th>PPG</th>
                        <th>G/Jogo</th>
                        <th>A/Jogo</th>
                    </tr>
                </thead>
                <tbody id="playerList">

                </tbody>
            </table>
        </div>
    </div>

<script  type="module" src="scripts.js"></script>

</body>
</html>
